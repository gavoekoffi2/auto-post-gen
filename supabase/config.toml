project_id = "ixinojsmymqovekgkbdg"

# generate-content is called by authenticated clients. We verify the user
# JWT inside the function (so the function can use the service role key
# to record usage), but Supabase's gateway should still require an apikey.
[functions.generate-content]
verify_jwt = true

# generate-image is the asynchronous companion to generate-content; the
# dashboard calls it right after text generation so the image can stream
# in while the user already sees the post.
[functions.generate-image]
verify_jwt = true

# auto-generate-weekly is a cron-only entry point. Protected by CRON_SECRET.
[functions.auto-generate-weekly]
verify_jwt = false

# send-validation-email is cron-only. Protected by CRON_SECRET.
[functions.send-validation-email]
verify_jwt = false

# validate-post is hit from the email link without a session token.
# Token validation is done in-function.
[functions.validate-post]
verify_jwt = false

# publish-post: manual triggers require user JWT (validated in-function),
# cron triggers use CRON_SECRET.
[functions.publish-post]
verify_jwt = false

# OAuth flows: callbacks must be reachable without a JWT (the provider
# does the redirect with just ?code=...&state=...).
[functions.oauth-start-linkedin]
verify_jwt = false

[functions.oauth-callback-linkedin]
verify_jwt = false

[functions.oauth-start-meta]
verify_jwt = false

[functions.oauth-callback-meta]
verify_jwt = false

[functions.oauth-start-twitter]
verify_jwt = false

[functions.oauth-callback-twitter]
verify_jwt = false

# delete-account validates the user JWT in-function so it can call the
# admin API on their behalf.
[functions.delete-account]
verify_jwt = false

# export-account-data validates the user JWT in-function (GDPR data export).
[functions.export-account-data]
verify_jwt = false

# Ayrshare: third-party social-media management API. ayrshare-connect
# provisions a per-user profile and returns a one-time JWT URL the
# user opens to OAuth into all their social accounts at once.
[functions.ayrshare-connect]
verify_jwt = false

[functions.ayrshare-status]
verify_jwt = false

# Postiz: social scheduling platform (the reference video's tool).
# postiz-connect returns a hosted OAuth URL; postiz-status lists channels.
# Both validate the user JWT in-function.
[functions.postiz-connect]
verify_jwt = false

[functions.postiz-status]
verify_jwt = false

# Zernio: social API (connect + publish for LinkedIn, Facebook, +13).
# zernio-connect returns a hosted OAuth URL; zernio-status lists the
# accounts connected under the user's Zernio profile. JWT checked in-function.
[functions.zernio-connect]
verify_jwt = false

[functions.zernio-status]
verify_jwt = false

# send-contact: public contact form → operator inbox via Resend. No JWT
# (anonymous visitors), validated + honeypot-protected in-function.
[functions.send-contact]
verify_jwt = false

# Engagement: comment inbox sync + AI auto-reply. sync-comments runs from
# cron (CRON_SECRET) or a logged-in user; comment-reply requires a user JWT.
[functions.sync-comments]
verify_jwt = false

[functions.comment-reply]
verify_jwt = false

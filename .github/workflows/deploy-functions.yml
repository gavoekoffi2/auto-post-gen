name: Recover and deploy Supabase backend

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch: {}

concurrency:
  group: auto-post-gen-supabase-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
      PROJECT_REF: tktoyntaeajgsuplhntd
      APP_ORIGIN: https://auto-post-gen.76.13.129.252.sslip.io
    steps:
      - uses: actions/checkout@v4

      - name: Verify Supabase access token
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is not configured."
            exit 1
          fi

      - name: Restore the project when paused
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.supabase.com/v1/projects/$PROJECT_REF"
          status="$(curl --fail-with-body -sS \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "$api" | jq -r '.status // "UNKNOWN"')"
          echo "Supabase project status: $status"

          if [ "$status" = "INACTIVE" ]; then
            echo "Restoring paused Supabase project..."
            curl --fail-with-body -sS -X POST \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{}' "$api/restore" >/dev/null
          fi

          for attempt in $(seq 1 60); do
            status="$(curl --fail-with-body -sS \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              "$api" | jq -r '.status // "UNKNOWN"')"
            echo "Readiness attempt $attempt: $status"
            case "$status" in
              ACTIVE_HEALTHY|ACTIVE) exit 0 ;;
              INACTIVE|REMOVED|UNKNOWN)
                if [ "$attempt" -gt 1 ]; then exit 1; fi
                ;;
            esac
            sleep 10
          done
          echo "::error::Supabase project did not become healthy in time."
          exit 1

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Configure production authentication
        shell: bash
        run: |
          set -euo pipefail
          jq -n \
            --arg origin "$APP_ORIGIN" \
            '{mailer_autoconfirm: true, site_url: $origin, uri_allow_list: ($origin + "/**")}' \
            > /tmp/auth-config.json
          curl --fail-with-body -sS -X PATCH \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/auth-config.json \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/config/auth" >/dev/null

      - name: Configure production secrets and origins
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$ZERNIO_API_KEY" ]; then
            echo "::error::ZERNIO_API_KEY is not configured."
            exit 1
          fi
          supabase secrets set \
            --project-ref "$PROJECT_REF" \
            ALLOWED_ORIGINS="$APP_ORIGIN" \
            APP_BASE_URL="$APP_ORIGIN" \
            ZERNIO_API_KEY="$ZERNIO_API_KEY"

      - name: Verify AI provider secrets without exposing values
        shell: bash
        run: |
          set -euo pipefail
          supabase secrets list --project-ref "$PROJECT_REF" --output json > /tmp/runtime-secrets.json
          jq -r '.[].name' /tmp/runtime-secrets.json | sort | sed 's/^/Configured runtime secret: /'
          for required in GRAPHISTE_GPT_API_KEY OPENROUTER_API_KEY; do
            if ! jq -e --arg required "$required" 'any(.[]; .name == $required)' /tmp/runtime-secrets.json >/dev/null; then
              echo "::error::$required is missing from Supabase Edge Function secrets."
              exit 1
            fi
          done
          echo "Graphiste GPT is configured for poster generation; OpenRouter is configured for text generation."

      - name: Apply the current editorial-mix migration
        shell: bash
        run: |
          set -euo pipefail
          migration="supabase/migrations/20260721000000_editorial_mix.sql"
          jq -Rs '{query: .}' < "$migration" > /tmp/editorial-mix-query.json
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/editorial-mix-query.json \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" >/dev/null

      - name: Deploy all edge functions
        run: supabase functions deploy --project-ref "$PROJECT_REF"

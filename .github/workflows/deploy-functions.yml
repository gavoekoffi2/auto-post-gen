name: Deploy Supabase Edge Functions

# Replaces Lovable's backend deployment. On every push to main that touches
# the functions, this deploys the image-generation edge function used by
# Pro Social AI. Other functions should be deployed explicitly when changed
# to avoid unrelated CDN/import failures blocking urgent hotfixes.
#
# One-time setup (GitHub → repo → Settings → Secrets and variables →
# Actions → New repository secret):
#   SUPABASE_ACCESS_TOKEN = a Supabase access token (supabase.com →
#                           Account → Access Tokens). Use a FRESH token.

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ixinojsmymqovekgkbdg
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy changed edge functions
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is not set — edge functions were NOT deployed."
            echo "Add it in repo Settings -> Secrets and variables -> Actions to enable deploys."
            exit 1
          fi
          supabase functions deploy generate-image --project-ref "$PROJECT_REF"
          supabase functions deploy publish-post --project-ref "$PROJECT_REF"
          supabase functions deploy zernio-status --project-ref "$PROJECT_REF"
          supabase functions deploy zernio-connect --project-ref "$PROJECT_REF"

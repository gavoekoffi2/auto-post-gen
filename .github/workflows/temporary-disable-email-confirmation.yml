name: Temporary Disable Supabase Email Confirmation

on:
  workflow_dispatch: {}

jobs:
  disable-email-confirmation:
    runs-on: ubuntu-latest
    env:
      SB_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ixinojsmymqovekgkbdg
    steps:
      - name: Disable email confirmation temporarily
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SB_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is not set."
            exit 1
          fi

          code=$(curl -sS -o /tmp/auth_patch_response.json -w "%{http_code}" \
            -X PATCH "https://api.supabase.com/v1/projects/${PROJECT_REF}/config/auth" \
            -H "Authorization: Bearer ${SB_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"mailer_autoconfirm":true}')

          echo "Supabase auth config patch HTTP status: ${code}"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::Supabase patch failed"
            exit 1
          fi

          echo "Email confirmation disabled temporarily."
          jq -r '"mailer_autoconfirm: \(.mailer_autoconfirm)"' /tmp/auth_patch_response.json
